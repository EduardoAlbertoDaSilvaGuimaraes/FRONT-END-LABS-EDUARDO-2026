<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<!-- fonte -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: #333;
}

.container {
    max-width: 800px;
    margin: 40px auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* HEADER NOVO */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #ddd;
    padding-bottom: 10px;
    margin-bottom: 20px;
}

.header-text h1 {
    margin: 0;
    font-size: 28px;
    color: #000;
}

.header-text p {
    margin: 5px 0 0;
    font-size: 18px;
    font-weight: bold;
}

.header-text i {
    margin-left: 5px;
}

.header-icons {
    display: flex;
    gap: 15px;
    font-size: 40px;
}

.header-icons i:nth-child(1) {
    color: #2da44e;
}

.header-icons i:nth-child(2) {
    color: #e83e8c;
}

/* GRID FORM */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.full {
    grid-column: span 2;
}

.section {
    grid-column: span 2;
    margin-top: 25px;
    font-weight: bold;
    color: #555;
    border-bottom: 2px solid #eee;
    padding-bottom: 5px;
}

label {
    font-size: 13px;
    margin-bottom: 3px;
    display: block;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    transition: 0.3s;
    outline: none;
}

input:focus, select:focus {
    border-color: #6c63ff;
    box-shadow: 0 0 5px rgba(108, 99, 255, 0.5);
}

.buttons {
    grid-column: span 2;
    display: flex;
    gap: 10px;
    margin-top: 25px;
}

button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.cancelar {
    background: #ccc;
}

.cancelar:hover {
    background: #999;
}

.enviar {
    background: linear-gradient(135deg, #6c63ff, #4b47d1);
    color: white;
}

.enviar:hover {
    transform: scale(1.03);
    opacity: 0.9;
}

/* Responsivo */
@media (max-width: 600px) {
    .form-grid {
        grid-template-columns: 1fr;
    }

    .full {
        grid-column: span 1;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="header-text">
            <h1>Faça seu cadastro!</h1>
            <p>Compre online <i class="fa fa-tag"></i></p>
        </div>

        <div class="header-icons">
            <i class="fa fa-user-plus"></i>
            <i class="fa fa-user-plus"></i>
        </div>
    </div>

    <form class="form-grid">

        <div class="section">Dados Pessoais</div>

        <div class="full">
            <label>Nome</label>
            <input type="text">
        </div>

        <div class="full">
            <label>Email</label>
            <input type="email">
        </div>

        <div>
            <label>Data de Nascimento</label>
            <input type="date">
        </div>

        <div>
            <label>CPF</label>
            <input type="text">
        </div>

        <div class="section">Endereço</div>

        <div class="full">
            <label>Rua</label>
            <input type="text">
        </div>

        <div>
            <label>Número</label>
            <input type="text">
        </div>

        <div>
            <label>Bairro</label>
            <input type="text">
        </div>

        <div>
            <label>CEP</label>
            <input type="text">
        </div>

        <div>
            <label>Cidade</label>
            <input type="text">
        </div>

        <div>
            <label>Estado</label>
            <select>
                <option>Selecione</option>
                <option>MG</option>
                <option>SP</option>
                <option>RJ</option>
            </select>
        </div>

        <div class="section">Login</div>

        <div class="full">
            <label>Imagem de perfil</label>
            <input type="file">
        </div>

        <div>
            <label>Login</label>
            <input type="text">
        </div>

        <div>
            <label>Senha</label>
            <input type="password">
        </div>

        <div class="full">
            <label>Confirmação de Senha</label>
            <input type="password">
        </div>

        <div class="buttons">
            <button type="button" class="cancelar">Cancelar</button>
            <button type="submit" class="enviar">Cadastrar</button>
        </div>

    </form>
</div>

</body>
</html>
