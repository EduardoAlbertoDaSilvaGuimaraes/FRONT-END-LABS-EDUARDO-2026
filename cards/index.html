<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cards de Ofertas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="pricing-area">
    <section class="pricing">
      <article class="card" data-plano="Gratuito">
        <h2>Gratuito</h2>
        <p class="price">R$0<span>/mês</span></p>

        <ul>
          <li>1 usuário</li>
          <li>3 contas de design</li>
          <li>Suporte por e-mail</li>
        </ul>

        <button>Escolher plano</button>
      </article>

      <article class="card selected" data-plano="Elite">
        <span class="badge">Mais popular</span>
        <h2>Elite</h2>
        <p class="price">R$99<span>/mês</span></p>

        <ul>
          <li>Usuários ilimitados</li>
          <li>10 contas de design</li>
          <li>100 implantações</li>
          <li>Suporte 24h por dia</li>
        </ul>

        <button>Escolher plano</button>
      </article>

      <article class="card" data-plano="Profissional">
        <h2>Profissional</h2>
        <p class="price">R$49<span>/mês</span></p>

        <ul>
          <li>100 usuários</li>
          <li>3 contas de design</li>
          <li>Suporte por e-mail</li>
        </ul>

        <button>Escolher plano</button>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
